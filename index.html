    <section class="venue_and_hours_blok reveal">

  <script>
    // const sparkleBox = document.querySelector('.sparkle-container');
    // for (let i = 0; i < 40; i++) {
    //   const sp = document.createElement('div');
    //   sp.className = 'sparkle';
    //   sp.style.left = Math.random() * 100 + '%';
    //   sp.style.top = Math.random() * 100 + '%';
    //   sp.style.animationDuration = (Math.random() * 5 + 4) + 's';
    //   sparkleBox.appendChild(sp);
    // }

    function runTypewriter(el) {
      const text = el.getAttribute('data-text');
      if (!text) return;

      el.innerText = '';
      let i = 0;
      const interval = setInterval(() => {
        if (i < text.length) {
          el.append(text.charAt(i));
          i++;
        } else { clearInterval(interval); }
      }, 70);
    }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('active');
          if (entry.target.classList.contains('type-text')) runTypewriter(entry.target);
        } else {
          entry.target.classList.remove('active');
          if (entry.target.classList.contains('type-text')) entry.target.innerText = '';
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal, .type-text').forEach(el => observer.observe(el));
  </script>
</body>
